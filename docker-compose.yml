version: "3.9"
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports: ["8000:8000"]
    volumes: ["./data:/app/data", "./vault:/app/vault"]
    environment:
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports: ["8501:8501"]
    volumes: ["./data:/app/data", "./vault:/app/vault"]
    environment:
      - PYTHONPATH=/app
    depends_on: [api]

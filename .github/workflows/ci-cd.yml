# LEGACY pipeline (NBA CV stack + security scan). The PRODUCT gate is ci.yml
# (Predictor CI). This file keeps lint + Trivy security-scan + optional model
# training/daily-pipeline. It NEVER commits or pushes (see the disabled step below).
name: NBA AI System CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run tests with coverage
      run: |
        python -m pytest tests/ -q --ignore=tests/cv --ignore=tests/gpu -x --tb=short \
          --cov=src --cov=scripts \
          --cov-report=term-missing \
          --cov-report=xml:coverage.xml \
          --cov-fail-under=30

    - name: Upload coverage XML
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-xml
        path: coverage.xml

  cv-quality:
    runs-on: ubuntu-latest
    continue-on-error: true  # non-blocking — CV tests may need GPU/data files
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || true
        pip install pytest

    - name: Run CV quality tests (non-blocking)
      run: python -m pytest tests/cv/ -v --tb=short || true

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    - name: Lint (ruff)
      run: |
        pip install ruff
        ruff check src/ api/ tests/ --ignore E501 || true

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'

  model-training:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[retrain]')
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Train models
      run: |
        python src/prediction/player_props.py --train
        pytest tests/test_models.py

    - name: Validate model improvement
      run: |
        RESULT=$(python scripts/compare_models.py --stat all --threshold 0.02 2>&1)
        echo "$RESULT"
        python scripts/compare_models.py --stat all --threshold 0.02

    # DISABLED 2026-06-15 (productization W10): this step used to `git add data/models/`
    # + `git commit` + `git push` from CI -- a violation of the binding invariants
    # (never auto-push to the public origin; never commit data/). data/ is now local-only
    # and gitignored. Re-enabling any CI push is a HUMAN-GATED decision (see
    # docs/SECURITY_REMEDIATION.md). The training metrics are reported, not committed.
    - name: Report model metrics (no commit / no push)
      run: |
        METRICS=$(python scripts/compare_models.py --stat all --threshold 0.02 2>&1 | grep -E "\[PASS\]|\[FAIL\]|\[FIRST RUN\]" | tr '\n' ' ')
        echo "Model metrics: ${METRICS}"
        echo "(CI auto-commit/push intentionally disabled -- data/ is local-only)"

  daily-pipeline:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run daily pipeline
      run: |
        python scripts/daily_pipeline.py --season 2024-25 || exit 1

    - name: Record slate results
      run: |
        python scripts/record_slate_results.py || true

name: Injury Feed Scrape (R15_W1)

# R15_W1 — refresh the ESPN injury snapshot every 30 minutes during a
# wide game-day window (15:00–04:00 UTC = 10:00 ET to 23:00 ET). The
# inference path also has an in-line stale-check (>6h triggers an
# on-demand scrape), so this cron is the proactive layer.
#
# The committed-snapshot pattern lets the production prop pipeline read
# the latest data/cache/injury_status_<date>.json straight from origin/
# master on RunPod between scheduled retrains.

# DISABLED 2026-06-15 (productization W10): this scheduled job pushed scraped injury
# data to the PUBLIC origin every 30 min -- a violation of the never-auto-push +
# data-is-local-only invariants. The cron triggers are removed (dispatch-only) and the
# commit/push step below is neutered. Re-enabling any CI push is HUMAN-GATED.
on:
  workflow_dispatch: {}     # manual only -- the 30-min cron auto-push is disabled

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Need write perms to commit the refreshed snapshot.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip

      - name: Install minimal deps
        run: |
          pip install requests pandas

      - name: Run R14_H4 injury probe
        run: |
          python scripts/probe_R14_H4_injury_feed.py

      - name: Report snapshot (no commit / no push -- data/ is local-only)
        run: |
          echo "Injury snapshot refreshed locally on the runner."
          echo "(CI auto-commit/push intentionally disabled -- data/ is gitignored/local-only;"
          echo " re-enabling a CI push to the public origin is a HUMAN-GATED decision.)"
